name: Build MyOS ISO

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Install live-build and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build debootstrap squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin mtools dosfstools \
            ca-certificates

      - name: Build ISO
        run: |
          chmod +x build-debian-kde.sh
          sudo ./build-debian-kde.sh

      - name: Dump build logs on failure
        if: failure()
        run: |
          echo "===== lb build logs ====="
          sudo cat build/build.log 2>/dev/null || true
          echo "===== bootstrap/chroot logs ====="
          sudo find build -maxdepth 2 -name "*.log" -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null || true

      - name: Show result
        run: ls -lh *.iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyOS-ISO
          path: "*.iso"
          if-no-files-found: error
          retention-days: 14
